<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Assignment</title>
    <style>
        form{
            font-family: Arial;
        }
        label{
            color:blue;
            font-weight: bold;
        }
        #submit-button{
            font-weight: bold;
            background-color: darkgreen;
            color: yellow;
            border-radius: 5px;
            border: 2px solid black;
            width: 100px;
            height: 30px;
            
        }
        #req-list{
            color:red;
            padding-left: 0;
            /*
            left padding makes bullet points disappear
            inside position pulls them back in since default is "outside"
            */
            list-style-position: inside;
        }
    </style>
</head>
<body>
    <!--
    methods:
    GET: Add data to end of URL (Insecure)
    POST: Send to backend server
    -->
    <form action="form.php" method="GET">
        <h1>Contact Form</h1>
        <div>
            <label for="name">Name</label>
            <br>
            <input type="text" id="name">
        </div>
        <br>
        <div>
            <label for="address">Address</label>
            <br>
            <input type="text" id="address">
        </div>
        <br>
        <div>
            <label for="zip-code">Zip Code</label>
            <br>
            <input type="number" id="zip-code">
        </div>

        <br>
        <!--Change type to "submit" when we need to write to php-->
        <input type="button" id="submit-button" value="SUBMIT" onclick="checkAllValid()">
        <ul id="req-list">
            <li id="name-req" hidden="true">Name is required.</li>
            <li id="address-req" hidden="true">Address is required.</li>
            <li id="zip-code-req" hidden="true">Zip Code is required.</li>
        </ul>
    </form>
    <script>
        /*
        Clarification Questions:
        CSS:
         - What does "input fields leave system default" mean?
           - Should "Name" element have a default value such as "John Doe" if empty?
        JS:
         - Should Error Messages be checked live?
           - "X is required": Flagged on Submit or on Keystroke?
        */

        function checkAllValid(){
            console.log("button clicked");
            const nameValid = isValidEntry("name");
            const addressValid = isValidEntry("address");
            const zipCodeValid = isValidEntry("zip-code");
        }
        function isValidEntry(id){
            //console.log("hit valid entry function")
            console.log(id);
            const element = document.getElementById(id);
            const curr_value = element.value;
            // ***improve*** hard coded
            const req = document.getElementById(id+"-req");
            console.log(element);
            console.log(curr_value);
            // if value is empty or null, immediately return false
            if (curr_value.length === 0 || curr_value === null){
                console.log("[Empty Value Check]: Value is empty.")
                console.log(req);
                req.hidden = false; 
                return false;
            }
            req.hidden = true; 
            // check number value
            // allow 5 digit zip or 5 digit + "-" + 4 digit?
            // regex for zip type check?
            if (element.type === "number"){
                // Add || curr_value.length !== 10 for Zip Code + 4?
                const isRightLength = (curr_value.length === 5);
                isRightLength ? console.log("[Length Check]: Result is 5.") : console.log("[Length Check]: Result is not 5 digits.");
                // check if value is not a num
                const isAllNum = !isNaN(parseInt(curr_value)) && isFinite(curr_value);
                isAllNum ? console.log("[Type Check Number]: Result is valid entry.") : console.log("[Type Check Number]: Result is not a number.");
                return (isAllNum && isRightLength);
            }
            // check text value
            // regex for address check?
            if (element.type === "text"){
                const result = curr_value.length <= 100;
                result ? console.log("[Type Check Text]: Result is valid entry."):console.log("[Type Check Text]: Result has more than 100 characters.");
                return result;
            }

        }
    </script>
</body>
</html>
