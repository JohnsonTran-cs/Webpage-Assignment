<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Assignment</title>
    <style>
        form{
            font-family: Arial;
        }
        label{
            color:blue;
            font-weight: bold;
        }
        #submit-button{
            font-weight: bold;
            background-color: darkgreen;
            color: yellow;
            border-radius: 5px;
            border: 2px solid black;
            width: 100px;
            height: 30px;
            
        }
        #req-list{
            color:red;
            padding-left: 0;
            /*
            left padding makes bullet points disappear
            inside position pulls them back in since default is "outside"
            */
            list-style-position: inside;
        }
    </style>
</head>
<body>
    <!--
    methods:
    GET: Add data to end of URL (Insecure)
    POST: Send to backend server
    -->
    <form action="form.php" method="POST">
        <h1>Contact Form</h1>
        <div>
            <label for="name">Name</label>
            <br>
            <input type="text" id="name">
        </div>
        <br>
        <div>
            <label for="address">Address</label>
            <br>
            <input type="text" id="address">
        </div>
        <br>
        <div>
            <label for="zip-code">Zip Code</label>
            <br>
            <input type="number" id="zip-code">
        </div>

        <br>
        <input type="submit" id="submit-button" value="SUBMIT">
        <ul id="req-list">
            <li id="name-req">Name is required.</li>
            <li id="name-address">Address is required.</li>
            <li id="name-req">Zip Code is required.</li>
        </ul>
    </form>
    <script>
        /*
        Clarification Questions:
        CSS:
         - What does "input fields leave system default" mean?
           - Should "Name" element have a default value such as "John Doe" if empty?
        JS:
         - Should Error Messages be checked live?
           - "X is required": Flagged on Submit or on Keystroke?
        */
        function isValidEntry(id){
            const element = document.getElementById(id);
            const value = element.value;
            // if value is empty or null, immediately return false
            if (element.value.length === 0 || element.value === null){
                console.log("[Empty Value Check]: Value is empty.")
                return false;
            }
            // check number value
            if (element.type === "number"){
                // check if value is not a num
                let result = !isNaN(parseInt(value) && isFinite(value));
                result ? console.log("[Type Check Number]: Result is valid entry.") : console.log("[Type Check Number]: Result is not a number.");
                return result;
            }
            // check text value
            if (element.type === "text"){
                let result = element.value.length <= 100;
                result ? console.log("[Type Check Text]: Result is valid entry."):console.log("[Type Check Text]: Result has more than 100 characters.");
                return result;
            }

        }
    </script>
</body>
</html>
